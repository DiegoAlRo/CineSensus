<!-- Clase del contenedor. -->
<div class="detalle-wrapper">

    <!-- Tarjeta de detalle de película. -->
    <div class="detalle-card">
        
        <!-- Imagen de la película. -->
        <img [src]="pelicula?.poster" alt="{{ pelicula?.titulo }}">

        <!-- Información de la película. -->
        <div class="info">

            <p class="sub-info"><strong>Género:</strong> {{ pelicula?.genero }}</p>
            <p class="sub-info"><strong>Director:</strong> {{ pelicula?.director }}</p>
            <p class="sub-info"><strong>Duración:</strong> {{ pelicula?.duracion }} min</p>

            <h3>Sinopsis</h3>
            <p class="descripcion">{{ pelicula?.sinopsis }}</p>

            <h3>Tráiler</h3>
            <iframe 
                *ngIf="pelicula?.trailer"
                width="560" 
                height="315" 
                [src]="pelicula?.trailer"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>

    </div>
    
</div>
