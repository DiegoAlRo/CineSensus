<!-- Clase del contenedor del formulario de login. -->
<div class="contenedor-form">

    <!-- Título del formulario de login. -->
    <h2 class="titulo-form">Inicia Sesión</h2>
    <p class="subtitulo-form">Identifícate y entra de nuevo en CineSensus</p>

    <!-- Formulario de login reactivo. -->
    <form [formGroup]="form" (ngSubmit)="login()" class="form-card">

        <!-- Se pedirá el correo del usuario. -->
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="Tu @email.com">

        <p class="mensaje-error" *ngIf="tieneError('email', 'required')">
            El correo es obligatorio.
        </p>

        <p class="mensaje-error" *ngIf="tieneError('email', 'email')">
            Debe ser un correo válido.
        </p>

        <!-- Se solicitará la contraseña. -->
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="********">

        <p class="mensaje-error" *ngIf="tieneError('password', 'required')">
            La contraseña es obligatoria.
        </p>

        <!-- botón de iniciar sesión. -->
        <button type="submit" class="btn-rojo">Entrar en CineSensus</button>

    </form>

    <!-- Este botón llevará al usuario al formulario de registro. -->
    <p class="cambio-form">
        ¿No tienes una cuenta?
        <a routerLink="/registro" class="cambio-link">Regístrate</a>
    </p>

</div>
