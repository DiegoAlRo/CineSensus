<!-- Barra de selección de menú -->
<div class="tabs-bar">

    <button class="tab" [class.activa]="vista === 'cartelera'" (click)="vista = 'cartelera'">
          CARTELERA
    </button>

    <button class="tab" [class.activa]="vista === 'perfil'" (click)="vista = 'perfil'">
         PERFIL
    </button>

</div>

<!-- Contenedor principal de la página. -->
<div class="contenedor-pagina">

    <!-- Vista de la CARTELERA -->
    <div *ngIf="vista === 'cartelera'">

        <!-- Título principal de la página. -->
        <h2 class="titulo-principal">Cartelera</h2>

        <!-- Contenedor de las tarjetas de películas. -->
        <div class="peliculas">

            <!-- Tarjeta de película, se repite por cada película en la lista. -->
            <div class="pelicula-card" *ngFor="let pelicula of peliculas" [routerLink]="['/pelicula', pelicula.id]">

                <!-- Imagen de la película. -->
                <img class="poster" [src]="pelicula.poster" alt="{{ pelicula.titulo }}">

                <!-- Información de la película. -->
                <div class="info">

                    <h3 class="pelicula-titulo">{{ pelicula.titulo }}</h3>

                    <p class="pelicula-detalles">

                        {{ pelicula.genero }}

                        <span *ngIf="pelicula.director"> • Dir. {{ pelicula.director }}</span>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Vista del PERFIL -->
    <div *ngIf="vista === 'perfil'">
        <h2 class="titulo-principal">Perfil</h2>
        
    </div>

</div>
