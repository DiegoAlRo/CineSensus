<!-- Aquí se mostrarán los botones que alternan entre la vista de perfil y cartelera en el menú principal. -->
<app-selectores-de-menu></app-selectores-de-menu>

<!-- Cinta con imágenes de posters. -->
<div class="cinta-posters" *ngIf="peliculas.length > 0">
    <div class="cinta-inner">
        <img *ngFor="let p of peliculas" [src]="p.poster" [alt]="p.titulo" class="poster-cinta">
    </div>
</div>


<!-- Contenedor principal de la página. -->
<div class="contenedor-pagina">

    <!-- Vista de la CARTELERA. -->

    <!-- Barra de acciones. -->
    <div class="barra-acciones">
        <button class="btn-accion" (click)="mostrarFiltro = !mostrarFiltro">Filtro</button>

        <div class="fecha-selector">
            <button class="btn-accion" (click)="mostrarFecha = !mostrarFecha">Fecha</button>

            <span class="fecha-mini">
                {{ fechaFormateada }}
            </span>
        </div>
    </div>

    <!-- Zona de Filtros. -->
    <div class="zona-contenido">

        <!-- Panel lateral de filtros. -->
        <div class="panel-filtros" *ngIf="mostrarFiltro">
            <h3>Filtros</h3>

            <!-- Filtro por título. -->
            <label>Buscar película</label>
            <input type="text" placeholder="Título..." [(ngModel)]="filtroTitulo" (input)="aplicarFiltros()">

            <!-- Filtro por género. -->
            <label>Género</label>
            <select [(ngModel)]="filtroGenero" (change)="aplicarFiltros()">
                <option value="">Por defecto</option>
                <option *ngFor="let g of generos" [value]="g">{{ g }}</option>
            </select>

            <!-- Filtro por tono. -->
            <label>Tono</label>
            <select [(ngModel)]="filtroTono" (change)="aplicarFiltros()">
                <option value="">Por defecto</option>
                <option *ngFor="let t of tonos" [value]="t">{{ t }}</option>
            </select>

            <!-- Filtro por duración. -->
            <label>Duración</label>
            <select [(ngModel)]="filtroDuracion" (change)="aplicarFiltros()">
                <option>Por defecto</option>
                <option>Menos de 90 min</option>
                <option>Entre 90 - 120 min</option>
                <option>Más de 120 min</option>
            </select>

            <!-- Filtro por puntuación media mínima. -->
            <label>Puntuación mínima</label>
            <select [(ngModel)]="filtroPuntuacion" (change)="aplicarFiltros()">
                <option value="">Por defecto</option>
                <option *ngFor="let p of puntuacion" [value]="p">
                    {{ p }} -
                    <span class="estrellas">
                        <ng-container *ngFor="let _ of [].constructor(p)">
                            ⭐
                        </ng-container>
                    </span>
                </option>
            </select>

            <!-- Bootón para borrar los filtros aplicados. -->
            <button class="btn-quitar-filtros" (click)="quitarFiltros()">
                Quitar filtros
            </button>

        </div>

        <div class="panel-fecha" *ngIf="mostrarFecha">
            <div class="calendario">

                <!-- Encabezado con mes actual y siguiente -->
                <div class="calendario-header">
                    <button (click)="mesAnterior()" [disabled]="!puedeIrMesAnterior">‹</button>
                    <span>{{ nombreMesActual }} {{ anioActual }}</span>
                    <button (click)="mesSiguiente()">›</button>
                </div>

                <!-- Días de la semana -->
                <div class="dias-semana">
                    <span *ngFor="let d of diasSemana">{{ d }}</span>
                </div>

                <!-- Días del calendario -->
                <div class="dias-grid">
                    <div *ngFor="let dia of diasCalendario" class="dia" [class.hoy]="esHoy(dia)"
                        [class.seleccionado]="esSeleccionado(dia)" [class.desactivado]="dia && dia < hoy"
                        (click)="dia && seleccionarDia(dia)">
                        {{ dia.getDate() }}
                    </div>
                </div>
            </div>

            <!-- Panel derecho con la fecha seleccionada -->
            <div class="fecha-info">
                <h3>Mostrando horarios para:</h3>
                <p>{{ fechaFormateada }}</p>
            </div>
        </div>

        <!-- Contenedor de las tarjetas de películas. -->
        <div class="peliculas">

            <!-- Tarjeta de película, se repite por cada película en la lista. -->
            <div class="pelicula-card" *ngFor="let pelicula of peliculas" [routerLink]="['/pelicula', pelicula.id]">

                <!-- Imagen de la película. -->
                <img class="poster" [src]="pelicula.poster">

                <!-- Información de la película. -->
                <div class="info">

                    <h3 class="pelicula-titulo">{{ pelicula.titulo }}</h3>

                    <p class="pelicula-detalles">

                        {{ pelicula.genero }}

                        <span *ngIf="pelicula.director"> • Dir. {{ pelicula.director }}</span>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>
